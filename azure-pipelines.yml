trigger:
- master

pool:
  name: Default

steps:
# ---------------------------
# 1. Build
# ---------------------------
- task: Maven@3
  displayName: 'Maven Build and Test'
  inputs:
    mavenPomFile: 'pom.xml'
    goals: 'clean package'
    publishJUnitResults: true
    testResultsFiles: '**/surefire-reports/TEST-*.xml'
    javaHomeOption: 'JDKVersion'
    jdkVersionOption: 'default'
    jdkArchitectureOption: 'x64'
  env:
    MAVEN_OPTS: '-Xmx3072m'

# ---------------------------
# 2. Code Coverage
# ---------------------------
- task: PublishCodeCoverageResults@1
  displayName: 'Publish Code Coverage'
  inputs:
    codeCoverageTool: 'JaCoCo'
    summaryFileLocation: '$(System.DefaultWorkingDirectory)/**/site/jacoco/jacoco.xml'
    reportDirectory: '$(System.DefaultWorkingDirectory)/**/site/jacoco'

# ---------------------------
# 3. Publish Artifact
# ---------------------------
- task: PublishBuildArtifacts@1
  displayName: 'Publish Artifact: drop'
  inputs:
    PathtoPublish: '$(System.DefaultWorkingDirectory)/webapp/target/webapp.war'
    ArtifactName: 'drop'
    publishLocation: 'Container'

# ---------------------------
# 4. Deploy (SAFE VERSION)
# ---------------------------
- script: |
    echo "Deploying WAR to Tomcat..."

    TOMCAT_WEBAPPS="/Users/deepakkumar/Downloads/apache-tomcat-9.0.117/webapps"
    WAR_SOURCE="$(System.DefaultWorkingDirectory)/webapp/target/webapp.war"

    echo "Step 1: Remove old deployment..."
    rm -rf $TOMCAT_WEBAPPS/webapp
    rm -f $TOMCAT_WEBAPPS/webapp.war

    echo "Step 2: Copy new WAR..."
    cp $WAR_SOURCE $TOMCAT_WEBAPPS/

    echo "Step 3: Waiting for Tomcat auto-deploy..."
    sleep 10

    echo "Step 4: Verifying deployment..."
    curl -f http://localhost:8080/webapp || exit 1

    echo "Deployment successful!"
  displayName: 'Deploy to Local Tomcat (Auto Deploy)'