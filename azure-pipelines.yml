trigger:
- master

pool:
  name: Default

steps:
- task: Maven@3
  displayName: 'Maven Build and Test'
  inputs:
    mavenPomFile: 'pom.xml'
    goals: 'clean package'
    publishJUnitResults: true
    testResultsFiles: '**/surefire-reports/TEST-*.xml'
    javaHomeOption: 'JDKVersion'
    jdkVersionOption: 'default'
    jdkArchitectureOption: 'x64'
  env:
    MAVEN_OPTS: '-Xmx3072m'

- task: PublishCodeCoverageResults@1
  displayName: 'Publish Code Coverage'
  inputs:
    codeCoverageTool: 'JaCoCo'
    summaryFileLocation: '$(System.DefaultWorkingDirectory)/**/site/jacoco/jacoco.xml'
    reportDirectory: '$(System.DefaultWorkingDirectory)/**/site/jacoco'

- task: PublishBuildArtifacts@1
  displayName: 'Publish Artifact: drop'
  inputs:
    PathtoPublish: '$(System.DefaultWorkingDirectory)/webapp/target/webapp.war'
    ArtifactName: 'drop'
    publishLocation: 'Container'

# ✅ NEW STEP (THIS IS YOUR DEPLOYMENT)
- script: |
    echo "Stopping Tomcat..."
    sh /Users/deepakkumar/Downloads/apache-tomcat-9.0.117/bin/shutdown.sh
    sleep 5

    echo "Cleaning old deployment..."
    rm -rf /Users/deepakkumar/Downloads/apache-tomcat-9.0.117/webapps/webapp*
    rm -rf /Users/deepakkumar/Downloads/apache-tomcat-9.0.117/work/*

    echo "Copying new WAR from build..."
    cp $(System.DefaultWorkingDirectory)/webapp/target/webapp.war \
    /Users/deepakkumar/Downloads/apache-tomcat-9.0.117/webapps/

    echo "Starting Tomcat..."
    sh /Users/deepakkumar/Downloads/apache-tomcat-9.0.117/bin/startup.sh

    echo "Deployment completed!"
  displayName: 'Deploy to Local Tomcat'